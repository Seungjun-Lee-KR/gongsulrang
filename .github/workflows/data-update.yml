name: 데이터 자동 갱신

on:
  schedule:
    # 매주 일요일 17:00 UTC = 월요일 02:00 KST
    - cron: '0 17 * * 0'
  workflow_dispatch:
    inputs:
      max_pages:
        description: '자치구 게시판 listing 페이지 상한 (delta=10, 풀 sync=200)'
        required: false
        default: '10'

concurrency:
  group: data-update
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    env:
      KAKAO_REST_API_KEY: ${{ secrets.KAKAO_REST_API_KEY }}
      SEOUL_OPENAPI_KEY: ${{ secrets.SEOUL_OPENAPI_KEY }}
      GOOGLE_PLACES_API_KEY: ${{ secrets.GOOGLE_PLACES_API_KEY }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: scripts/requirements.txt

      - name: pip install
        run: pip install -r scripts/requirements.txt

      - name: 본청 OpenAPI 수집
        run: python scripts/01_fetch_openapi.py

      - name: 자치구 24구 수집
        # 매주 갱신은 최근 페이지만 훑으면 충분 (delta-only)
        # 풀 sync 필요 시 입력 max_pages를 크게 (예: 200)
        # CSV 축소 가드: parse 실패율이 높아 expense_raw.csv가 70% 미만으로 줄면
        # 이전 버전으로 자동 복원 (기존 데이터 보존). 임계값은 SHRINK_PCT.
        env:
          MAX_PAGES: ${{ inputs.max_pages || '10' }}
          SHRINK_PCT: '70'
        run: |
          set +e
          fails=()
          shrunk=()
          districts=(ddm dobong dongjak ep gangbuk gangnam gangseo geumcheon guro gwangjin gwanak jongno junggu jungnang mapo nowon sb sdm seocho seongdong songpa yangcheon ydp yongsan)
          mkdir -p /tmp/csv-snapshots
          # ep/gwanak/sdm은 posts.json 캐시 없이 매번 CSV를 full overwrite하는
          # streaming 구조라 --max-pages 제한이 곧 데이터 손실로 이어짐 (guard가 revert).
          # 따라서 이 3개는 자체 default(전체 페이지)로 돌리도록 분기.
          full_crawl=" ep gwanak sdm "
          for c in "${districts[@]}"; do
            echo "::group::collect_$c"
            csv="data/output/${c}_expense_raw.csv"
            before_lines=0
            if [ -f "$csv" ]; then
              cp "$csv" "/tmp/csv-snapshots/${c}_before.csv"
              before_lines=$(wc -l < "$csv")
            fi
            if [[ "$full_crawl" == *" $c "* ]]; then
              if python "scripts/collect_${c}.py"; then
                :
              else
                fails+=("$c")
                echo "::warning::collect_$c 실패"
              fi
            else
              if python "scripts/collect_${c}.py" --stage all --max-pages "$MAX_PAGES" 2>/dev/null; then
                :
              elif python "scripts/collect_${c}.py" --max-pages "$MAX_PAGES"; then
                :
              else
                fails+=("$c")
                echo "::warning::collect_$c 실패"
              fi
            fi
            if [ -f "/tmp/csv-snapshots/${c}_before.csv" ] && [ -f "$csv" ] && [ "$before_lines" -gt 100 ]; then
              after_lines=$(wc -l < "$csv")
              threshold=$((before_lines * SHRINK_PCT / 100))
              if [ "$after_lines" -lt "$threshold" ]; then
                echo "::warning::collect_$c CSV 축소 감지: ${after_lines}행 < 임계 ${threshold}행 (이전 ${before_lines}). 이전 CSV로 복원."
                cp "/tmp/csv-snapshots/${c}_before.csv" "$csv"
                shrunk+=("$c")
              fi
            fi
            echo "::endgroup::"
          done
          if [ ${#fails[@]} -gt 0 ]; then
            echo "::warning::수집 실패 자치구: ${fails[*]}"
          fi
          if [ ${#shrunk[@]} -gt 0 ]; then
            echo "::warning::CSV 축소로 복원된 자치구: ${shrunk[*]}"
          fi

      - name: 강동구 수집
        env:
          SHRINK_PCT: '70'
        run: |
          set +e
          csv="data/output/gangdong_expense_raw.csv"
          before_lines=0
          if [ -f "$csv" ]; then
            cp "$csv" /tmp/gangdong_before.csv
            before_lines=$(wc -l < "$csv")
          fi
          python scripts/09_gangdong_list.py || echo "::warning::gangdong list"
          python scripts/10_gangdong_fetch_pdfs.py || echo "::warning::gangdong fetch"
          python scripts/11_gangdong_parse.py || echo "::warning::gangdong parse"
          if [ -f /tmp/gangdong_before.csv ] && [ -f "$csv" ] && [ "$before_lines" -gt 100 ]; then
            after_lines=$(wc -l < "$csv")
            threshold=$((before_lines * SHRINK_PCT / 100))
            if [ "$after_lines" -lt "$threshold" ]; then
              echo "::warning::gangdong CSV 축소 감지: ${after_lines}행 < 임계 ${threshold}행 (이전 ${before_lines}). 이전 CSV로 복원."
              cp /tmp/gangdong_before.csv "$csv"
            fi
          fi

      - name: 식당 단위 집계
        run: python scripts/04_aggregate.py

      - name: 지오코딩 (Kakao)
        run: python scripts/05_geocode.py --limit 5000

      - name: Google Places enrich (TOP 3000)
        run: python scripts/07_enrich_google_places.py --top 3000

      - name: 프론트엔드 JSON 생성
        run: python scripts/06_to_frontend_json.py

      - name: 변경분 commit & push
        run: |
          git config user.name "gongsulrang-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data/output src/data/restaurants.json
          if git diff --cached --quiet; then
            echo "변경 없음"
          else
            git commit -m "data: 자동 갱신 ($(date -u +%Y-%m-%d))"
            git push
          fi
